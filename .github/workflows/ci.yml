name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore PolicyPremium.sln

      - name: Check formatting
        run: dotnet format PolicyPremium.sln --verify-no-changes --no-restore --verbosity diagnostic

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore PolicyPremium.sln

      - name: Build
        run: dotnet build PolicyPremium.sln --configuration Release --no-restore

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore PolicyPremium.sln

      - name: Test
        run: dotnet test PolicyPremium.sln --configuration Release --no-restore --verbosity normal

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t policy-premium-service:${{ github.sha }} .

      # Only persist the image when commits land on master (i.e. a PR has been merged).
      # On PR builds the image is still built above as a gate, but not saved or uploaded.
      - name: Save image to tarball
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: docker save policy-premium-service:${{ github.sha }} -o policy-premium-service.tar

      - name: Upload image artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: policy-premium-service-image
          path: policy-premium-service.tar
          retention-days: 7

  deploy:
    name: Deploy (mocked)
    runs-on: ubuntu-latest
    needs: docker-build
    # Runs only when commits land on master (i.e. a PR has been merged), never on PR builds.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://policy-premium.example.com
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: policy-premium-service-image

      - name: Load image
        run: docker load -i policy-premium-service.tar

      - name: Deploy to mocked target
        run: |
          echo "Deploying policy-premium-service:${{ github.sha }} to the MOCKED production target."
          echo "No real infrastructure is provisioned: this stands in for a registry push + rollout."
          docker images policy-premium-service
          echo "Mock deployment complete -> https://policy-premium.example.com"
