name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test-lint:
    name: Build, test and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Display .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore PolicyPremium.sln

      - name: Check formatting
        run: dotnet format PolicyPremium.sln --verify-no-changes --verbosity diagnostic

      - name: Build
        run: dotnet build PolicyPremium.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PolicyPremium.sln --configuration Release --no-build --verbosity normal

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build-test-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t policy-premium-service:${{ github.sha }} .